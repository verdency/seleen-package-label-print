<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/bwip-js@3.0.4/dist/bwip-js-min.js"></script>
    <style>
        @page { size: 50mm 30mm; margin: 0; }
        
        body { 
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0; 
            display: flex; justify-content: center;
            background: #f4f4f4;
            -webkit-font-smoothing: antialiased;
        }

        .label {
            width: 50mm; height: 30mm;
            background: white;
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
            padding: 0mm 1mm;
            display: flex;
            flex-direction: column;
        }

        .row-1 {
            display: flex;
            justify-content: center; 
            align-items: center;
            margin-bottom: 0mm;
        }
        .model-sku { font-size: 20pt; font-weight: 800; line-height: 1; }
        .size-box { 
            background: black !important; color: white !important;
            width: 11mm; height: 10mm;
            display: flex; justify-content: center; align-items: center;
            font-size: 20pt; font-weight: 900;
            margin-left: 1pt;
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }

        .row-2 {
            text-align: center;
            font-size: 6pt;
            margin-bottom: .5mm;
            white-space: nowrap;
        }
        .variant-text { font-size: 4pt; font-weight: 700; }

        .bottom-area {
            display: flex;
            flex: 1;
            gap: .5mm;
        }

        .left-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        .product-name { 
            font-size: 5pt; 
            text-align: center; 
            line-height: 1.1; 
            margin-bottom: 1mm;
            min-height: 4mm;
        }

/* --- XỬ LÝ ĐƯỜNG KẺ GIỮA SIÊU MẢNH --- */
        .info-box {
            /* Sử dụng màu xám vừa phải để giảm độ nở mực khi in nhiệt */
            box-shadow: 0 0 0 0.1px #666; 
            border: none;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }
        
        .info-row-top {
            /* Loại bỏ border-bottom truyền thống */
            border-bottom: none; 
            font-size: 6pt;
            text-align: center;
            padding: 0.3mm 0;
            position: relative;
        }

        /* Tạo đường kẻ ngăn cách siêu mảnh bằng giả lập */
        .info-row-top::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            /* Chỉ sử dụng 0.1px và màu nhạt hơn để máy in không bị đậm nét */
            height: 1px; 
            background-color: #888; 
        }

        .info-row-bottom {
            font-size: 6pt;
            text-align: center;
            padding: 0.3mm 0;
        }

        .supplier { 
            font-size: 4pt; 
            font-style: italic; 
            margin-top: 1mm;
            text-align: center;
        }

        .right-col {
            width: 15mm;
            display: flex;
            justify-content: flex-end;
            align-items: flex-start;
            padding-top: 1mm;
        }

        #qrcode {
            width: 14mm;
            height: 14mm;
        }

        @media print { 
            body { background: none; }
            .size-box { 
                background-color: black !important; 
                -webkit-print-color-adjust: exact; 
            }
            
            /* Ép máy in nhiệt sử dụng mức đốt thấp nhất cho đường kẻ */
            .info-box {
                box-shadow: 0 0 0 0.2pt #888 !important;
            }
            .info-row-top::after {
                height: 0.5pt !important;
                background-color: #999 !important;
            }
        }
    </style>
</head>
<body>

<div class="label">
    <div class="row-1">
        <div class="model-sku" id="model-sku">WB0193</div>
        <div class="size-box" id="size">XL</div>
    </div>

    <div class="row-2">
        <span id="sku">SE_WB0193_C228_L</span> – <span class="variant-text" id="variant">Bố Ruby - Xám đen</span>
    </div>

    <div class="bottom-area">
        <div class="left-col">
            <div class="product-name" id="product-name">Quần tây lưng cao ống suông chi tiết vạt (có thể tháo)</div>
            <div class="info-box">
                <div class="info-row-top">
                    <span id="quantity">11</span> | <span id="date">15/04/2026</span>
                </div>
                <div class="info-row-bottom" id="mo">SE-260330-0193-L16-FL1</div>
            </div>
            <div class="supplier" id="supplier">XUÂN KỶ - Q12</div>
        </div>

        <div class="right-col">
            <canvas id="qrcode"></canvas>
        </div>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const fields = ['model-sku', 'size', 'sku', 'variant', 'product-name', 'quantity', 'date', 'mo', 'supplier'];

    fields.forEach(field => {
        if(params.has(field)) {
            document.getElementById(field).innerText = params.get(field);
        }
    });

    const qrValue = params.get('qr-code') || params.get('sku') || "SE_WB0193_C228_L";

    try {
        bwipjs.toCanvas('qrcode', {
            bcid:        'qrcode',
            text:        qrValue,
            scale:       5,
            height:      15,
            width:       15,
            eclevel:     'L',
            includetext: false,
        });
    } catch (e) {
        console.error(e);
    }
</script>

</body>
</html>
